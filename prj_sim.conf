# Renode simulation firmware configuration
# Build with: pio run -e xiaoble_sense_sim
#
# Key difference from prj.conf:
#   CONFIG_GAIT_RENODE_SIM=y  — selects imu_sim_reader.c instead of imu_reader.c
#                                and skips BLE / NVS calibration
#   CONFIG_LSM6DSO=n          — IMU sensor not used; no I2C driver compiled in

CONFIG_GAIT_RENODE_SIM=y

# Firmware stack — sim-only: disable BT/I2C/NVS/PM to avoid Renode peripheral floods
# BT stack causes heavy RADIO peripheral accesses that slow simulation to <1% real-time
# I2C not needed (IMU is memory-mapped stub at 0x400B0000)
# NVS not needed (calibration persistence skipped in sim)
CONFIG_I2C=n
CONFIG_BT=n
CONFIG_BT_PERIPHERAL=n
CONFIG_RING_BUFFER=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_PM=n
CONFIG_NVS=n
CONFIG_SENSOR=n

# Disable actual LSM6DSO driver — sim mode reads from sysbus stub
CONFIG_LSM6DSO=n
CONFIG_LSM6DSO_TRIGGER_GLOBAL_THREAD=n

# Logging / console
# CONFIG_LOG=n: Zephyr deferred log thread blocks on ENDTX interrupt that
# the Python UART stub never fires → gait thread never runs (BUG-004).
# printk() uses a direct poll path that the stub handles correctly.
# The gait engine (STEP/SNAPSHOT/SESSION_END) uses printk, not LOG macros.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=n
CONFIG_PRINTK=y
# Enable floating-point in cbprintf so printk("%.1f") prints actual values
CONFIG_CBPRINTF_FP_SUPPORT=y
