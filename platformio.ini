[platformio]
boards_dir = boards

[env:xiaoble_sense]
platform      = nordicnrf52
board         = xiao_ble_sense
framework     = zephyr
build_flags   =
monitor_speed = 115200
build_src_filter = +<*> -<imu/imu_sim_reader.c>

# Renode simulation variant — same gait algorithm, sim-mode IMU reader
[env:xiaoble_sense_sim]
platform      = nordicnrf52
board         = xiao_ble_sense
framework     = zephyr
build_flags   =
monitor_speed = 115200
build_src_filter = +<src/>
extra_scripts = post:scripts/link_app_lib.py
board_build.zephyr.cmake_extra_args = -DCONF_FILE=/Users/siyaoshao/gait_device/prj_sim.conf

[env:native]
platform       = native
test_build_src = yes
build_flags    =
  -DUNIT_TEST
  -std=c11
  -I src
